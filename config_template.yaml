# -----------------------------------------------------------------------------
# Sign Language Recognition - Configuration Template
# -----------------------------------------------------------------------------

data:
  dataset_root: "./data/raw/ASL-20-Words-Dataset-V1/Full Data"
  target_size: [112, 112]
  num_frames: 30
  batch_size: 8
  num_workers: 4
  val_size: 0.15
  test_size: 0.15

model:
  name: "improved3dcnn"    # See models/__init__.py for other options
  num_classes: 20
  pretrained: true
  dropout_rate: 0.5
  
training:
  num_epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  seed: 42
  
advanced:
  mixed_precision: true
  use_hand_detection: true
  
output:
  experiment_name: "3dcnn_asl20"
  output_dir: "./results"
  model_dir: "./checkpoints"
  log_dir: "./logs"
